# Build and publish release artifacts when a v* tag is pushed.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6.1.0
        with:
          args: release --clean
        env:
          # The default token has enough scope now that we no longer
          # publish to a separate homebrew-tap repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
