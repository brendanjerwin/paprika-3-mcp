# .goreleaser.yaml
version: 2
before:
  hooks:
    - go mod tidy

# 🏗 Build configuration. Trimmed to platforms we actually ship to —
# the agent toolbox uses linux_amd64; macOS amd64/arm64 cover dev
# laptops and Windows amd64 covers the upstream's documented support
# matrix. 32-bit and freebsd targets removed to keep CI fast and avoid
# 32-bit-libc headaches on Nix-based dev hosts.
builds:
  - id: paprika-3-mcp
    main: ./cmd/paprika-3-mcp
    binary: paprika-3-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

# 📦 Archive configuration
archives:
- formats:
    - zip
  name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

# 📝 SHA256 checksums
checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

# 📜 Changelog (uses Conventional Commits)
changelog:
  use: github
  format: "{{.SHA}}: {{.Message}} (@{{.AuthorUsername}})"
  sort: desc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

# Homebrew tap publishing removed in this fork — release flow is GitHub Releases only.
